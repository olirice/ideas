<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beach Enjoyment Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(180deg,
      #87CEEB 0%,
      #5BB8F5 25%,
      #3AA0E8 40%,
      #1a8fd8 50%,
      #F5DEB3 50%,
      #F5DEB3 55%,
      #E8D5A3 60%,
      #DEC893 100%
    );
    background-attachment: fixed;
    color: #1a1a2e;
    overflow-x: hidden;
  }

  /* sun */
  body::before {
    content: '';
    position: fixed;
    top: 40px;
    right: 80px;
    width: 120px;
    height: 120px;
    background: radial-gradient(circle, #FFE566 0%, #FFD700 40%, rgba(255,215,0,0.2) 70%, transparent 100%);
    border-radius: 50%;
    z-index: 0;
    pointer-events: none;
  }

  /* clouds */
  body::after {
    content: '☁️       ☁️          ☁️';
    position: fixed;
    top: 60px;
    left: 40px;
    font-size: 3rem;
    opacity: 0.6;
    z-index: 0;
    pointer-events: none;
    letter-spacing: 2rem;
    animation: drift 60s linear infinite;
  }

  @keyframes drift {
    from { transform: translateX(-200px); }
    to { transform: translateX(100vw); }
  }

  /* waves */
  .waves {
    position: fixed;
    top: calc(50% - 30px);
    left: 0;
    width: 200%;
    height: 60px;
    z-index: 0;
    pointer-events: none;
  }
  .wave {
    position: absolute;
    width: 200%;
    height: 40px;
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,0.15) 40px,
      rgba(255,255,255,0.15) 80px
    );
    border-radius: 50% 50% 0 0;
  }
  .wave:nth-child(1) {
    top: 0;
    animation: wave-move 8s linear infinite;
    background: rgba(26, 143, 216, 0.25);
    height: 20px;
    border-radius: 40%;
  }
  .wave:nth-child(2) {
    top: 12px;
    animation: wave-move 11s linear infinite reverse;
    background: rgba(26, 143, 216, 0.15);
    height: 18px;
    border-radius: 45%;
  }

  @keyframes wave-move {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
    padding: 40px 20px 80px;
    text-align: center;
  }

  h1 {
    font-family: 'Pacifico', cursive;
    font-size: 2.8rem;
    color: #fff;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.3), 0 0 40px rgba(255,255,255,0.2);
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .subtitle {
    font-size: 1rem;
    color: rgba(255,255,255,0.85);
    text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
    margin-bottom: 30px;
    font-weight: 600;
  }

  .counter-card {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 36px 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    margin-bottom: 28px;
  }

  .counter-label {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #888;
    margin-bottom: 8px;
    font-weight: 700;
  }

  #counter {
    font-size: 4rem;
    font-weight: 900;
    color: #c0392b;
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
    transition: color 0.3s;
  }
  #counter.heating-up { color: #e74c3c; }
  #counter.on-fire { color: #ff2d2d; text-shadow: 0 0 20px rgba(255,45,45,0.3); }

  .rate-info {
    font-size: 0.8rem;
    color: #999;
    margin-top: 8px;
  }

  #startBtn {
    display: inline-block;
    padding: 16px 48px;
    font-size: 1.2rem;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    border: none;
    border-radius: 60px;
    cursor: pointer;
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    color: #fff;
    box-shadow: 0 4px 16px rgba(231,76,60,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  #startBtn:hover { transform: scale(1.05); box-shadow: 0 6px 24px rgba(231,76,60,0.5); }
  #startBtn:active { transform: scale(0.97); }
  #startBtn.running {
    background: linear-gradient(135deg, #95a5a6, #7f8c8d);
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }

  #resetBtn {
    display: none;
    padding: 10px 28px;
    font-size: 0.85rem;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    border: 2px solid rgba(0,0,0,0.15);
    border-radius: 60px;
    cursor: pointer;
    background: transparent;
    color: #555;
    margin-left: 12px;
    transition: background 0.15s;
  }
  #resetBtn:hover { background: rgba(0,0,0,0.05); }

  .bought-section {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 28px 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    text-align: left;
  }

  .bought-header {
    font-size: 1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #888;
    margin-bottom: 16px;
    text-align: center;
  }

  #boughtList {
    list-style: none;
    padding: 0;
  }

  #boughtList li {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border-radius: 12px;
    margin-bottom: 6px;
    font-size: 0.95rem;
    animation: slideIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    background: rgba(46, 204, 113, 0.08);
    border: 1px solid rgba(46, 204, 113, 0.15);
  }

  #boughtList li .emoji {
    font-size: 1.5rem;
    margin-right: 12px;
    flex-shrink: 0;
    width: 36px;
    text-align: center;
  }

  #boughtList li .item-info {
    flex: 1;
  }

  #boughtList li .item-name {
    font-weight: 600;
    color: #2d3436;
  }

  #boughtList li .item-price {
    font-size: 0.8rem;
    color: #27ae60;
    font-weight: 700;
  }

  #boughtList li .item-qty {
    font-size: 0.75rem;
    color: #999;
    font-weight: 600;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-12px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .palm-left, .palm-right {
    position: fixed;
    bottom: 0;
    font-size: 5rem;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }
  .palm-left { left: 10px; }
  .palm-right { right: 10px; transform: scaleX(-1); }

  .elapsed {
    font-size: 0.8rem;
    color: #aaa;
    margin-top: 4px;
  }

  @media (max-width: 500px) {
    h1 { font-size: 2rem; }
    #counter { font-size: 2.8rem; }
    .container { padding: 24px 12px 60px; }
  }
</style>
</head>
<body>

<div class="waves">
  <div class="wave"></div>
  <div class="wave"></div>
</div>

<div class="palm-left">🌴</div>
<div class="palm-right">🌴</div>

<div class="container">
  <h1>Beach Enjoyment Tracker</h1>
  <p class="subtitle">How much is that beach trip really costing you?</p>

  <div class="counter-card">
    <div class="counter-label">Money Burned So Far</div>
    <div id="counter">$0.00</div>
    <div class="rate-info">$15,000 over 3 days &mdash; that's ~$0.058/sec</div>
    <div class="elapsed" id="elapsed"></div>
  </div>

  <div style="margin-bottom: 28px;">
    <button id="startBtn" onclick="toggleTimer()">Start the Burn 🔥</button>
    <button id="resetBtn" onclick="resetTimer()">Reset</button>
  </div>

  <div class="bought-section">
    <div class="bought-header">What You Could've Bought Instead</div>
    <ul id="boughtList">
      <li style="background:transparent;border:none;text-align:center;color:#aaa;font-style:italic;">
        Hit start and watch the regret pile up...
      </li>
    </ul>
  </div>
</div>

<script>
// $15,000 / 3 days = $15000 / 259200 seconds ≈ $0.05787037/sec
// We tick every cent: $0.01 / $0.05787037 ≈ 172.8ms per cent
const TOTAL = 15000;
const DAYS = 3;
const RATE_PER_SEC = TOTAL / (DAYS * 24 * 60 * 60);
const TICK_MS = Math.round(10 / RATE_PER_SEC); // ms per cent

let cents = 0;
let running = false;
let intervalId = null;
let startTime = null;
let accumulatedMs = 0;

const counterEl = document.getElementById('counter');
const elapsedEl = document.getElementById('elapsed');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');
const boughtList = document.getElementById('boughtList');

// Items sorted most expensive first. Each: [emoji, name, price in dollars]
const items = [
  ['🚗', 'Used Fiat Punto (it runs... sometimes)', 3200],
  ['🎓', 'One semester of community college textbooks', 1400],
  ['📺', '65" TV to watch beach videos from home', 800],
  ['🎮', 'PS5 (beaches don\'t have load times)', 500],
  ['🍎', 'iPhone SE (to doom-scroll at a cheaper beach)', 429],
  ['🤖', 'Roomba (at least it works while you relax)', 400],
  ['🎸', 'A decent electric guitar', 350],
  ['🕹️', 'Nintendo Switch + Zelda', 310],
  ['👟', 'Pair of Jordans', 190],
  ['🍷', 'A really nice dinner for two', 150],
  ['🔧', 'A power drill (build your own beach)', 130],
  ['🎧', 'AirPods Pro', 130],
  ['🐟', 'A home aquarium setup (indoor ocean)', 110],
  ['🧳', 'A carry-on suitcase (for a cheaper trip)', 95],
  ['🎂', 'A truly absurd custom cake', 80],
  ['💈', 'A year of haircuts', 75],
  ['🏋️', 'A set of dumbbells (beach body at home)', 65],
  ['🛒', 'Costco membership (a year of free samples)', 65],
  ['⛽', 'A full tank of gas (to drive somewhere cheaper)', 60],
  ['🧸', 'Giant 5-foot teddy bear', 50],
  ['🍕', 'Pizza every Friday for 6 months', 48],
  ['📚', '10 paperback books', 45],
  ['🥃', 'A nice bottle of whiskey', 42],
  ['🎪', 'Two movie tickets + large popcorn + drinks', 40],
  ['🐠', 'A pet goldfish + tank + a year of food', 35],
  ['🧦', '12 pairs of really nice socks', 30],
  ['🌮', '30 Taco Bell burritos', 28],
  ['☕', 'A bag of fancy coffee beans', 22],
  ['🍕', 'A large Domino\'s pizza with everything', 19],
  ['🎰', '$15 in scratch-off tickets (better odds tbh)', 15],
  ['🧴', 'A big bottle of sunscreen (ironic)', 14],
  ['📎', '10,000 paperclips (start an empire)', 12],
  ['🍩', 'A dozen Krispy Kreme donuts', 11],
  ['🧊', '5 bags of ice (make your own beach cooler)', 10],
  ['🫧', '50 bottles of bubbles', 9],
  ['🎈', '100 balloons (throw your own party)', 8],
  ['🐔', 'A whole rotisserie chicken', 7],
  ['🥚', 'A carton of eggs (finally affordable)', 5],
  ['🍌', '5 lbs of bananas', 3.50],
  ['🥖', 'A fresh baguette 🤌', 3],
  ['🧃', 'A juice box', 1.50],
  ['🍬', 'A candy bar', 1.25],
  ['🫗', 'A single can of La Croix', 1],
  ['🖍️', 'One crayon (draw your own beach)', 0.50],
  ['🍋', 'A single lemon (make lemonade)', 0.40],
  ['🥔', 'One (1) potato', 0.30],
  ['🫘', 'A single ramen packet', 0.25],
  ['🍬', 'A gumball', 0.25],
  ['💭', 'A penny for your thoughts × 2', 0.02],
];

// Track how many times each item has been "bought"
let boughtCounts = new Array(items.length).fill(0);
let lastBoughtIndex = -1;
let placeholderRemoved = false;

function formatMoney(dollars) {
  return '$' + dollars.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatElapsed(ms) {
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return `${h}h ${m}m ${s}s elapsed`;
  if (m > 0) return `${m}m ${s}s elapsed`;
  return `${s}s elapsed`;
}

function tick() {
  cents++;
  const dollars = cents / 100;
  counterEl.textContent = formatMoney(dollars);

  // Visual heat
  if (dollars > 5000) {
    counterEl.className = 'on-fire';
  } else if (dollars > 1000) {
    counterEl.className = 'heating-up';
  }

  // Elapsed time
  const elapsed = accumulatedMs + (Date.now() - startTime);
  elapsedEl.textContent = formatElapsed(elapsed);

  // Check items from cheapest to most expensive (reverse) for new unlocks
  updateBoughtList(dollars);

  if (dollars >= TOTAL) {
    stopTimer();
    counterEl.textContent = formatMoney(TOTAL);
    startBtn.textContent = '🏖️ Trip Complete!';
    startBtn.disabled = true;
  }
}

function updateBoughtList(dollars) {
  // Go through items cheapest first; for each item, check if we can afford more
  for (let i = items.length - 1; i >= 0; i--) {
    const [emoji, name, price] = items[i];
    const canAfford = Math.floor(dollars / price);
    if (canAfford > boughtCounts[i]) {
      if (!placeholderRemoved) {
        boughtList.innerHTML = '';
        placeholderRemoved = true;
      }
      boughtCounts[i] = canAfford;
      addOrUpdateItem(i, emoji, name, price, canAfford);
    }
  }
}

function addOrUpdateItem(index, emoji, name, price, qty) {
  let existing = document.getElementById('item-' + index);
  if (existing) {
    // Update quantity
    const qtyEl = existing.querySelector('.item-qty');
    if (qty > 1) {
      qtyEl.textContent = ' × ' + qty;
    }
    // Re-trigger animation
    existing.style.animation = 'none';
    existing.offsetHeight; // reflow
    existing.style.animation = '';
  } else {
    // Insert in correct position (most expensive at top)
    const li = document.createElement('li');
    li.id = 'item-' + index;
    li.innerHTML = `
      <span class="emoji">${emoji}</span>
      <span class="item-info">
        <span class="item-name">${name}</span><br>
        <span class="item-price">${formatMoney(price)}</span>
        <span class="item-qty">${qty > 1 ? ' × ' + qty : ''}</span>
      </span>
    `;
    // Find the right place: items with lower index (more expensive) come first
    let inserted = false;
    const children = boughtList.children;
    for (let c = 0; c < children.length; c++) {
      const childIndex = parseInt(children[c].id.replace('item-', ''));
      if (index < childIndex) {
        boughtList.insertBefore(li, children[c]);
        inserted = true;
        break;
      }
    }
    if (!inserted) {
      boughtList.appendChild(li);
    }
  }
}

function toggleTimer() {
  if (running) {
    stopTimer();
  } else {
    startTimer();
  }
}

function startTimer() {
  running = true;
  startTime = Date.now();
  intervalId = setInterval(tick, TICK_MS);
  startBtn.textContent = 'Pause';
  startBtn.classList.add('running');
  resetBtn.style.display = 'inline-block';
}

function stopTimer() {
  running = false;
  accumulatedMs += Date.now() - startTime;
  clearInterval(intervalId);
  intervalId = null;
  startBtn.textContent = 'Resume 🔥';
  startBtn.classList.remove('running');
}

function resetTimer() {
  stopTimer();
  cents = 0;
  accumulatedMs = 0;
  boughtCounts = new Array(items.length).fill(0);
  placeholderRemoved = false;
  counterEl.textContent = '$0.00';
  counterEl.className = '';
  elapsedEl.textContent = '';
  startBtn.textContent = 'Start the Burn 🔥';
  startBtn.disabled = false;
  startBtn.classList.remove('running');
  resetBtn.style.display = 'none';
  boughtList.innerHTML = `
    <li style="background:transparent;border:none;text-align:center;color:#aaa;font-style:italic;">
      Hit start and watch the regret pile up...
    </li>
  `;
}
</script>

</body>
</html>
